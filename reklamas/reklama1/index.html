<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Banner reklāma | Cerība</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F5F0E8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 12px;
        }

        /* Banner konteiners – horizontāls, elastīgs */
        .banner {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            padding: 0.8rem 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            transition: transform 0.1s;
        }

        /* Kreisā puse – teksts un zīmols */
        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 140px;
        }

        .badge {
            background: #EFF5E8;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #3D6725;
            width: fit-content;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #2E4A1E;
            line-height: 1.2;
        }

        .title span {
            color: #C99E3E;
        }

        .message {
            font-size: 0.65rem;
            color: #5A6B47;
            max-width: 240px;
            border-left: 2px solid #C4A86B;
            padding-left: 8px;
            margin-top: 2px;
        }

        /* Produktu ikonas */
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .prod-icon {
            background: #F2EDE3;
            border-radius: 40px;
            padding: 0.3rem 0.7rem;
            font-size: 0.65rem;
            font-weight: 500;
            color: #4B6A2E;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .prod-icon i {
            font-size: 0.7rem;
        }

        /* Poga – skaidra, bet kompakta */
        .cta {
            background: #5D8736;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: 0.15s;
        }

        .cta:hover {
            background: #446B28;
            transform: translateY(-1px);
        }

        /* E-pasts mazā formātā */
        .email {
            font-size: 0.6rem;
            color: #7B6E55;
        }

        .email a {
            color: #4B6A2E;
            text-decoration: none;
        }

        /* Responsīvs – uz maziem ekrāniem pāriet vertikālā izkārtojumā */
        @media (max-width: 650px) {
            .banner {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .brand {
                align-items: center;
            }
            .message {
                max-width: none;
                text-align: center;
                border-left: none;
                padding-left: 0;
                margin-top: 6px;
            }
            .products {
                justify-content: center;
            }
            .cta {
                justify-content: center;
            }
            .email {
                text-align: center;
            }
        }

        /* Ļoti šauriem ekrāniem vēl mazāks fonts */
        @media (max-width: 450px) {
            .title {
                font-size: 1rem;
            }
            .prod-icon {
                padding: 0.2rem 0.6rem;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="brand">
            <div class="badge"><i class="fas fa-tractor"></i> Ģimenes saimniecība</div>
            <div class="title">Piemāju saimniecība <span>Cerība</span></div>
            <div class="message"><i class="fas fa-shield-alt"></i> Aizsargājam ražu – veselīgi produkti</div>
        </div>
        <div class="products">
            <span class="prod-icon"><i class="fas fa-egg"></i> Olas</span>
            <span class="prod-icon"><i class="fas fa-carrot"></i> Dārzeņi</span>
            <span class="prod-icon"><i class="fas fa-apple-alt"></i> Ogas</span>
            <span class="prod-icon"><i class="fas fa-drumstick-bite"></i> Gaļa</span>
        </div>
        <button class="cta" onclick="window.top.location.href='mailto:psceribas@gmail.com'">
            <i class="fas fa-envelope"></i> Pieteikties
        </button>
        <div class="email">
            <i class="fas fa-at"></i> <a href="mailto:psceribas@gmail.com">psceribas@gmail.com</a>
        </div>
    </div>
</body>
</html>
